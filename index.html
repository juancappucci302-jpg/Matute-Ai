<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Matute">
<title>Matute 💀</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Creepster&family=Share+Tech+Mono&display=swap');
:root{--ember:#CC2200;--bone:#E8DCC8;--void:#0A0A0A;--blood:#8B0000;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--void);color:var(--bone);font-family:'Share Tech Mono',monospace;min-height:100vh;min-height:-webkit-fill-available;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:20px 16px 40px;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(139,0,0,0.08) 0%,transparent 60%);pointer-events:none;}
.title{font-family:'Creepster',cursive;font-size:clamp(2.5rem,10vw,4rem);color:var(--ember);letter-spacing:.08em;text-shadow:0 0 20px rgba(204,34,0,0.6);line-height:1;text-align:center;}
.subtitle{font-size:.65rem;color:#555;letter-spacing:.3em;text-transform:uppercase;margin-top:4px;text-align:center;}
.skull-svg{width:180px;height:180px;filter:drop-shadow(0 0 12px rgba(204,34,0,0.4));}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes jaw-anim{from{transform:rotate(-2deg)}to{transform:rotate(6deg)}}
.jaw{transform-origin:90px 145px;}
.jaw-talk{animation:jaw-anim .12s ease-in-out infinite alternate;}
.status-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px;width:100%;max-width:340px;}
.dot{width:8px;height:8px;border-radius:50%;background:#333;flex-shrink:0;transition:background .3s;}
.dot.ok{background:#00AA44;box-shadow:0 0 6px #00AA44;}
.dot.err{background:#CC2200;box-shadow:0 0 6px #CC2200;}
.dot.think{background:#FF8800;box-shadow:0 0 6px #FF8800;}
.status-txt{font-size:.7rem;color:#666;}
.bubble{background:rgba(139,0,0,.12);border:1px solid rgba(139,0,0,.25);border-radius:12px;padding:14px 16px;font-size:.85rem;color:var(--bone);line-height:1.5;min-height:80px;display:flex;align-items:center;justify-content:center;text-align:center;width:100%;max-width:340px;margin-bottom:8px;}
.bubble.active{border-color:rgba(204,34,0,.5);}
.transcript{font-size:.65rem;color:#444;text-align:center;min-height:18px;font-style:italic;width:100%;max-width:340px;}
@keyframes mic-pulse{0%{box-shadow:0 0 0 0 rgba(204,34,0,.4)}70%{box-shadow:0 0 0 20px rgba(204,34,0,0)}100%{box-shadow:0 0 0 0 rgba(204,34,0,0)}}
.mic-btn{width:80px;height:80px;border-radius:50%;border:2px solid #333;background:#111;color:var(--bone);font-size:2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-appearance:none;transition:all .2s;}
.mic-btn.listening{border-color:var(--ember);animation:mic-pulse 1s ease-out infinite;}
.mic-btn.thinking{border-color:#FF8800;}
.mic-btn.speaking{border-color:#00AA44;box-shadow:0 0 16px rgba(0,170,68,.4);}
.mic-lbl{font-size:.65rem;color:#555;letter-spacing:.2em;text-transform:uppercase;margin-top:8px;}
.auto-badge{font-size:.6rem;color:#3A6;border:1px solid #3A6;border-radius:4px;padding:2px 8px;margin-top:4px;}
.start-screen{position:fixed;inset:0;background:#0A0A0A;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:24px;}
.start-screen.hidden{display:none;}
.start-title{font-family:'Creepster',cursive;font-size:3.5rem;color:var(--ember);text-shadow:0 0 20px rgba(204,34,0,.6);}
.start-btn{width:140px;height:140px;border-radius:50%;border:2px solid var(--ember);background:rgba(204,34,0,.15);color:var(--bone);font-size:4rem;cursor:pointer;-webkit-appearance:none;animation:mic-pulse 1.5s ease-out infinite;}
.start-hint{font-size:.7rem;color:#555;letter-spacing:.2em;text-align:center;padding:0 40px;}
.settings{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:1px solid #222;padding:16px;transform:translateY(100%);transition:transform .3s;z-index:100;}
.settings.open{transform:translateY(0);}
.settings input{width:100%;background:#1A1A1A;border:1px solid #333;border-radius:8px;padding:10px 12px;color:var(--bone);font-family:'Share Tech Mono',monospace;font-size:.75rem;outline:none;margin-bottom:10px;}
.settings input:focus{border-color:var(--ember);}
.lbl{font-size:.65rem;color:#555;letter-spacing:.1em;margin-bottom:6px;display:block;}
.btn-save{background:var(--blood);color:var(--bone);border:none;border-radius:6px;padding:8px 16px;font-family:'Share Tech Mono',monospace;font-size:.75rem;cursor:pointer;}
.cfg-btn{position:fixed;top:16px;right:16px;background:none;border:1px solid #333;color:#555;border-radius:6px;padding:6px 10px;font-size:.65rem;cursor:pointer;font-family:'Share Tech Mono',monospace;z-index:10;}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#300;border:1px solid var(--blood);color:#FF6666;padding:10px 18px;border-radius:8px;font-size:.7rem;opacity:0;transition:all .3s;pointer-events:none;z-index:200;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="start-screen" id="startScreen">
  <div class="start-title">💀 MATUTE</div>
  <button class="start-btn" onclick="iniciar()">🎙</button>
  <div class="start-hint">tocá una vez · después escucha solo</div>
</div>

<button class="cfg-btn" onclick="toggleCfg()">⚙ CONFIG</button>

<div style="text-align:center;z-index:1">
  <div class="title">MATUTE</div>
  <div class="subtitle">cráneo · ia · v4.0</div>
</div>

<svg class="skull-svg" id="skull" viewBox="0 0 180 190" fill="none">
  <ellipse cx="90" cy="80" rx="72" ry="75" fill="#1A1A1A" stroke="#3A2A2A" stroke-width="1.5"/>
  <ellipse cx="90" cy="60" rx="55" ry="48" fill="#111"/>
  <ellipse cx="32" cy="100" rx="20" ry="16" fill="#161616"/>
  <ellipse cx="148" cy="100" rx="20" ry="16" fill="#161616"/>
  <ellipse cx="62" cy="82" rx="22" ry="20" fill="#050505"/>
  <ellipse cx="118" cy="82" rx="22" ry="20" fill="#050505"/>
  <ellipse id="eyeL" cx="62" cy="82" rx="14" ry="13" fill="#CC0000"/>
  <ellipse cx="62" cy="82" rx="6" ry="6" fill="#000" opacity=".5"/>
  <ellipse id="eyeR" cx="118" cy="82" rx="14" ry="13" fill="#CC0000"/>
  <ellipse cx="118" cy="82" rx="6" ry="6" fill="#000" opacity=".5"/>
  <ellipse cx="85" cy="110" rx="5" ry="4" fill="#0A0A0A"/>
  <ellipse cx="95" cy="110" rx="5" ry="4" fill="#0A0A0A"/>
  <rect x="28" y="128" width="124" height="12" rx="4" fill="#151515" stroke="#2A2A2A" stroke-width="1"/>
  <g id="jaw" class="jaw">
    <path d="M35 135 Q35 165 90 168 Q145 165 145 135" fill="#181818" stroke="#2A2A2A" stroke-width="1.5"/>
    <rect x="55" y="133" width="10" height="12" rx="2" fill="#D4C9A8"/>
    <rect x="68" y="133" width="10" height="14" rx="2" fill="#D4C9A8"/>
    <rect x="81" y="133" width="10" height="14" rx="2" fill="#D4C9A8"/>
    <rect x="94" y="133" width="10" height="14" rx="2" fill="#D4C9A8"/>
    <rect x="107" y="133" width="10" height="12" rx="2" fill="#D4C9A8"/>
    <rect x="58" y="152" width="9" height="11" rx="2" fill="#C8BC9A"/>
    <rect x="70" y="151" width="9" height="13" rx="2" fill="#C8BC9A"/>
    <rect x="82" y="151" width="9" height="13" rx="2" fill="#C8BC9A"/>
    <rect x="94" y="151" width="9" height="13" rx="2" fill="#C8BC9A"/>
    <rect x="106" y="152" width="9" height="11" rx="2" fill="#C8BC9A"/>
  </g>
  <path d="M90 15 L88 35 L92 45" stroke="#2A2A2A" stroke-width="1" fill="none"/>
</svg>

<div style="width:100%;max-width:340px;z-index:1">
  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <div class="status-txt" id="stxt">Tocá el cráneo para comenzar</div>
  </div>
  <div class="bubble" id="bubble"><span style="color:#444;font-style:italic;font-size:.75rem">Preguntame algo... si te animás.</span></div>
  <div class="transcript" id="trans"></div>
</div>

<div style="display:flex;flex-direction:column;align-items:center;z-index:1">
  <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎙</button>
  <div class="mic-lbl" id="micLbl">esperando...</div>
  <div class="auto-badge" id="badge" style="display:none">● MODO AUTO</div>
</div>

<div class="settings" id="cfg">
  <label class="lbl">API KEY DE ANTHROPIC</label>
  <input type="password" id="keyInput" placeholder="sk-ant-..." autocomplete="off"/>
  <label class="lbl">PERSONALIDAD</label>
  <input type="text" id="promptInput" value="Sos Matute, un cráneo humano animatrónico con siglos de sabiduría oscura. Respondés en español rioplatense, con humor negro y frases cortas. Máximo 2 oraciones." autocomplete="off"/>
  <button class="btn-save" onclick="guardar()">GUARDAR Y CERRAR</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Variables globales ────────────────────────────
var apiKey = localStorage.getItem('mk') || '';
var sysProm = localStorage.getItem('mp') || 'Sos Matute, un cráneo humano animatrónico con siglos de sabiduría oscura. Respondés en español rioplatense, con humor negro y frases cortas. Máximo 2 oraciones.';
var rec = null;
var estado = 'idle';
var auto = false;
var hist = [];
var voz = null;
var eyePulse = null;
var eyeBright = 30;
var eyeDir = 2;
var blinkTimer = null;

// ── Inicio ────────────────────────────────────────
window.onload = function() {
  document.getElementById('keyInput').value = apiKey;
  document.getElementById('promptInput').value = sysProm;
  cargarVoces();
};

function cargarVoces() {
  function buscar() {
    var vs = window.speechSynthesis.getVoices();
    if (!vs.length) return;
    var prioridad = ['Monica','Paulina','Jorge','Juan','Diego','es-AR','es-MX','es-ES','es'];
    for (var i = 0; i < prioridad.length; i++) {
      for (var j = 0; j < vs.length; j++) {
        if (vs[j].name.indexOf(prioridad[i]) >= 0 || vs[j].lang.indexOf(prioridad[i]) >= 0) {
          voz = vs[j];
          console.log('Voz:', voz.name, voz.lang);
          return;
        }
      }
    }
    voz = vs[0];
  }
  window.speechSynthesis.onvoiceschanged = buscar;
  buscar();
}

// ── Pantalla inicio ───────────────────────────────
function iniciar() {
  // Desbloquear audio iOS con utterance silenciosa
  try {
    var u = new SpeechSynthesisUtterance('.');
    u.volume = 0.01;
    u.rate = 10;
    u.onend = function() {
      document.getElementById('startScreen').classList.add('hidden');
      auto = true;
      document.getElementById('badge').style.display = 'block';
      if (!apiKey) { toggleCfg(); toast('Configurá tu API key'); return; }
      setupRec();
      setTimeout(escuchar, 500);
      iniciarPulsoOjos();
    };
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  } catch(e) {
    document.getElementById('startScreen').classList.add('hidden');
    auto = true;
    document.getElementById('badge').style.display = 'block';
    setupRec();
    setTimeout(escuchar, 500);
    iniciarPulsoOjos();
  }
}

// ── Pulso ojos idle ───────────────────────────────
function iniciarPulsoOjos() {
  clearInterval(eyePulse);
  eyePulse = setInterval(function() {
    if (estado !== 'idle') return;
    eyeBright += eyeDir;
    if (eyeBright >= 180 || eyeBright <= 20) eyeDir = -eyeDir;
    var c = 'rgb(' + eyeBright + ',0,0)';
    document.getElementById('eyeL').style.fill = c;
    document.getElementById('eyeR').style.fill = c;
  }, 15);
}

function setOjos(r, g, b) {
  var c = 'rgb(' + r + ',' + g + ',' + b + ')';
  document.getElementById('eyeL').style.fill = c;
  document.getElementById('eyeR').style.fill = c;
}

// ── Reconocimiento voz ────────────────────────────
function setupRec() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('Sin soporte de voz'); return; }
  rec = new SR();
  rec.lang = 'es-AR';
  rec.continuous = false;
  rec.interimResults = true;

  rec.onstart = function() {
    setEstado('listening');
    document.getElementById('trans').textContent = 'Escuchando...';
  };

  rec.onresult = function(e) {
    var txt = '';
    for (var i = 0; i < e.results.length; i++) txt += e.results[i][0].transcript;
    document.getElementById('trans').textContent = '» ' + txt;
    if (e.results[e.results.length-1].isFinal && txt.trim().length > 1) {
      rec.stop();
      preguntarClaude(txt.trim());
    }
  };

  rec.onerror = function(e) {
    if (e.error === 'no-speech') { if (auto) setTimeout(escuchar, 600); return; }
    if (e.error === 'aborted') return;
    setEstado('idle');
    toast('Mic: ' + e.error);
  };

  rec.onend = function() {
    if (estado === 'listening' && auto) setTimeout(escuchar, 400);
  };
}

function escuchar() {
  if (estado === 'thinking' || estado === 'speaking') return;
  try { rec && rec.start(); } catch(e) {}
}

function toggleMic() {
  if (!auto) { iniciar(); return; }
  if (estado === 'listening') { rec && rec.stop(); setEstado('idle'); }
  else if (estado === 'speaking') { window.speechSynthesis.cancel(); setEstado('idle'); if (auto) setTimeout(escuchar, 400); }
  else escuchar();
}

// ── Claude API ────────────────────────────────────
function preguntarClaude(texto) {
  setEstado('thinking');
  setStatus('think', 'Matute está pensando...');
  setOjos(255, 140, 0);
  hist.push({role:'user', content:texto});

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'anthropic-version': '2023-06-01',
      'x-api-key': apiKey,
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 250,
      system: sysProm,
      messages: hist
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.error) throw new Error(data.error.message);
    var reply = data.content[0].text;
    hist.push({role:'assistant', content:reply});
    if (hist.length > 16) hist = hist.slice(-16);
    mostrarRespuesta(reply);
    hablar(reply);
  })
  .catch(function(err) {
    setEstado('idle');
    setStatus('err', 'Error: ' + err.message.slice(0,40));
    hist.pop();
    if (auto) setTimeout(escuchar, 2000);
  });
}

// ── Mostrar texto ─────────────────────────────────
function mostrarRespuesta(txt) {
  var b = document.getElementById('bubble');
  b.classList.add('active');
  b.innerHTML = '';
  var i = 0;
  var iv = setInterval(function() {
    b.textContent += txt[i++];
    if (i >= txt.length) clearInterval(iv);
  }, 28);
}

// ── TTS ───────────────────────────────────────────
function hablar(txt) {
  setEstado('speaking');
  setStatus('ok', 'Matute está hablando...');
  setOjos(0, 255, 80);
  document.getElementById('jaw').classList.add('jaw-talk');

  // Limpiar acciones entre asteriscos
  var limpio = txt.replace(/\*[^*]+\*/g, '').trim();

  window.speechSynthesis.cancel();

  setTimeout(function() {
    if (!window.speechSynthesis) { terminarHabla(); return; }

    var u = new SpeechSynthesisUtterance(limpio);
    u.lang = 'es-AR';
    u.rate = 0.82;
    u.pitch = 0.50;
    u.volume = 1.0;
    if (voz) u.voice = voz;

    u.onend = function() { terminarHabla(); };
    u.onerror = function(e) {
      if (e.error === 'interrupted' || e.error === 'canceled') return;
      terminarHabla();
    };

    // Fix iOS: re-resume cada 10s para evitar que se corte
    var keepAlive = setInterval(function() {
      if (!window.speechSynthesis.speaking) { clearInterval(keepAlive); return; }
      window.speechSynthesis.pause();
      window.speechSynthesis.resume();
    }, 10000);

    window.speechSynthesis.speak(u);
  }, 200);
}

function terminarHabla() {
  document.getElementById('jaw').classList.remove('jaw-talk');
  setEstado('idle');
  setStatus('ok', 'Matute escucha...');
  document.getElementById('trans').textContent = '';
  if (auto) setTimeout(escuchar, 700);
}

// ── UI helpers ────────────────────────────────────
function setEstado(s) {
  estado = s;
  var btn = document.getElementById('micBtn');
  var lbl = document.getElementById('micLbl');
  btn.className = 'mic-btn';
  if (s === 'idle') {
    btn.textContent = '🎙';
    lbl.textContent = auto ? 'modo auto activo' : 'toca para hablar';
    setOjos(eyeBright, 0, 0);
  } else if (s === 'listening') {
    btn.classList.add('listening'); btn.textContent = '👂';
    lbl.textContent = 'escuchando...';
  } else if (s === 'thinking') {
    btn.classList.add('thinking'); btn.textContent = '💀';
    lbl.textContent = 'pensando...';
  } else if (s === 'speaking') {
    btn.classList.add('speaking'); btn.textContent = '🔊';
    lbl.textContent = 'hablando...';
  }
}

function setStatus(tipo, txt) {
  document.getElementById('dot').className = 'dot ' + tipo;
  document.getElementById('stxt').textContent = txt;
}

function toggleCfg() { document.getElementById('cfg').classList.toggle('open'); }

function guardar() {
  apiKey = document.getElementById('keyInput').value.trim();
  sysProm = document.getElementById('promptInput').value.trim();
  localStorage.setItem('mk', apiKey);
  localStorage.setItem('mp', sysProm);
  toggleCfg();
  if (apiKey) setStatus('ok', 'Listo ✓');
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3500);
}
</script>
</body>
</html>
